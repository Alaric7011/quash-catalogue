<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Item — Quash Admin</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.svg">
</head>
<body>

  <div class="shell">
    <header class="admin-nav">
      <div class="admin-nav__brand">
        <span class="admin-nav__brand-name">QUASH</span>
        <span class="admin-nav__tag">Admin</span>
      </div>
      <button class="admin-nav__logout" id="logout-btn">Sign Out</button>
    </header>

    <main class="admin-main">

      <!-- ============== FIND VIEW ============== -->
      <section id="view-find">
        <a href="index.html" class="page-back">← Back</a>

        <div class="page-head">
          <h1>Edit Item</h1>
          <p>Find a product to update. Search by name or code, or browse by category.</p>
        </div>

        <div class="tabs" role="tablist">
          <button class="tabs__tab is-active" id="tab-search" role="tab">Search</button>
          <button class="tabs__tab" id="tab-browse" role="tab">Browse</button>
        </div>

        <!-- Search panel -->
        <div id="panel-search">
          <div class="field">
            <label class="field__label" for="search-input">Search by name or code</label>
            <input type="search" id="search-input" class="input" placeholder="e.g. Pearl, or QSH-001"
                   autocomplete="off" inputmode="search" />
          </div>
        </div>

        <!-- Browse panel -->
        <div id="panel-browse" class="is-hidden">
          <div class="field">
            <label class="field__label" for="browse-category">Choose a category</label>
            <select id="browse-category" class="select">
              <option value="" disabled selected>Select a category…</option>
            </select>
          </div>
        </div>

        <div class="divider-line"></div>

        <div id="results-status" class="muted" style="font-size:.85rem;margin-bottom:.75rem;"></div>
        <div class="result-list" id="result-list"></div>
        <div class="spinner is-hidden" id="loading-spinner"></div>
      </section>

      <!-- ============== EDIT VIEW ============== -->
      <section id="view-edit" class="is-hidden">
        <button class="page-back" id="back-to-find" type="button">← Back to results</button>

        <div class="page-head">
          <h1 id="edit-title">Edit Item</h1>
          <p id="edit-subtitle" class="muted"></p>
        </div>

        <form class="form" id="edit-form" autocomplete="off" novalidate>

          <div class="field">
            <span class="field__label">Product Code</span>
            <div class="code-preview" id="edit-code">—</div>
            <div class="field__hint">Permanent. Cannot be changed.</div>
          </div>

          <div class="field">
            <label class="field__label" for="edit-name">Item Name <span class="req">*</span></label>
            <input type="text" id="edit-name" class="input" required maxlength="120" />
          </div>

          <div class="field">
            <label class="field__label" for="edit-category">Category <span class="req">*</span></label>
            <select id="edit-category" class="select" required></select>
          </div>

          <div class="field">
            <label class="field__label" for="edit-description">Description</label>
            <textarea id="edit-description" class="textarea" maxlength="1200"></textarea>
          </div>

          <div class="field image-field">
            <span class="field__label">Image 1 <span class="req">*</span></span>
            <div class="image-drop" id="edit-drop-1">
              <input type="file" accept="image/*" id="edit-file-1" />
              <div class="image-drop__hint">
                <strong>Tap to replace</strong><br>
                <span class="muted">leave blank to keep current image</span>
              </div>
            </div>
          </div>

          <div class="field image-field">
            <span class="field__label">Image 2</span>
            <div class="image-drop" id="edit-drop-2">
              <input type="file" accept="image/*" id="edit-file-2" />
              <div class="image-drop__hint">
                <strong>Tap to replace</strong><br>
                <span class="muted">leave blank to keep current</span>
              </div>
            </div>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" id="edit-featured" />
            <span class="checkbox-row__text">
              Featured on home page
              <small>Show this product in the "This Season's Edit" section.</small>
            </span>
          </label>

          <label class="checkbox-row">
            <input type="checkbox" id="edit-active" />
            <span class="checkbox-row__text">
              Active on website
              <small>Uncheck to hide this product from the public site. The product code remains reserved.</small>
            </span>
          </label>

          <div class="save-bar">
            <button type="button" class="btn btn--ghost" id="cancel-edit">Cancel</button>
            <button type="submit" class="btn btn--primary" id="save-edit">Save Changes</button>
          </div>
        </form>
      </section>

    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/api.js"></script>
  <script src="js/edit-item.js"></script>
</body>
</html>
